<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI 小说转剧本</title><style>:root{--bg:#faf9f7;--card:#fff;--t:#2c2416;--t2:#6b5e4a;--b:#d4c8b5;--p:#8b5e3c;--r:10px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:serif;background:var(--bg);color:var(--t);line-height:1.8}.h{background:var(--card);border-bottom:2px solid var(--b);padding:16px 20px;text-align:center}.h h1{font-size:20px;color:var(--p)}.h .s{font-size:12px;color:var(--t2)}.c{max-width:960px;margin:20px auto;padding:0 14px}.cd{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:18px;margin-bottom:14px}.cd h2{font-size:15px;color:var(--p);margin-bottom:10px;border-bottom:1px solid var(--b);padding-bottom:5px}textarea{width:100%;min-height:240px;padding:12px;font-size:14px;border:1px solid var(--b);border-radius:6px;resize:vertical;font-family:inherit;outline:none}textarea:focus{border-color:var(--p)}.rw{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}.rw .f{flex:1;min-width:160px}.f label{display:block;font-size:11px;color:var(--t2);margin-bottom:2px}.f input{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--b);border-radius:4px;font-family:inherit;outline:none}.f input:focus{border-color:var(--p)}.bt{padding:10px 24px;font-size:14px;font-weight:600;border:none;border-radius:6px;cursor:pointer}.bt-p{background:var(--p);color:#fff}.bt-p:hover{opacity:.9}.bt-p:disabled{opacity:.5}.st{padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px}.st.ld{background:#fff8e1;border:1px solid #ffd54f;color:#6d4c00}.st.er{background:#ffebee;border:1px solid #ef9a9a;color:#b71c1c}.sp{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:var(--p);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:6px}@keyframes sp{to{transform:rotate(360deg)}}.ss{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0}.sx{text-align:center;padding:10px 16px;background:#faf7f3;border-radius:8px}.sx .n{font-size:22px;font-weight:700;color:var(--p)}.sx .l{font-size:11px;color:var(--t2)}pre{background:#faf7f3;padding:12px;border-radius:6px;overflow:auto;font-size:12px;max-height:450px;border:1px solid var(--b)}.tb{display:flex;margin-bottom:10px}.ta{padding:6px 14px;border:1px solid var(--b);cursor:pointer;font-size:12px;background:#faf7f3}.ta:first-child{border-radius:6px 0 0 6px}.ta:last-child{border-radius:0 6px 6px 0}.ta.ac{background:var(--p);color:#fff;border-color:var(--p)}.tc{display:none}.tc.ac{display:block}.ft{text-align:center;padding:18px;color:var(--t2);font-size:12px}@media(max-width:640px){.rw{flex-direction:column}.c{padding:0 6px}}</style></head><body><header class="h"><h1>📜 AI 小说转剧本工具</h1><div class="s">3章以上小说 → 结构化YAML剧本</div></header><div class="c"><div class="cd"><h2>📖 输入小说文本</h2><textarea id="nt" placeholder="粘贴3章以上小说...&#10;支持：第一章 xxx / 第1章 xxx / Chapter 1"></textarea><div class="rw"><div class="f"><label>标题</label><input id="ti"></div><div class="f"><label>作者</label><input id="au"></div><div class="f"><label>风格</label><input id="st" placeholder="悬疑/喜剧/正剧"></div></div><div style="display:flex;align-items:center;gap:8px;margin-top:8px"><button class="bt bt-p" id="btn" onclick="go()">🎬 开始转换</button><span style="font-size:11px;color:var(--t2)">AI四阶段：角色提取→场景切分→对白生成→YAML</span></div></div><div id="sa"></div><div id="ra"></div></div><div class="ft">AI 小说转剧本 · Powered by DeepSeek</div><script>const A='/api';async function go(){const t=document.getElementById('nt').value.trim();if(!t){sh('请输入小说文本','er');return}const b=document.getElementById('btn');b.disabled=true;b.textContent='⏳ 转换中...';sh('AI四阶段流水线运行中...','ld');document.getElementById('ra').innerHTML='';try{const r=await fetch(A+'/convert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({novel_text:t,novel_title:document.getElementById('ti').value,author:document.getElementById('au').value,style_note:document.getElementById('st').value})});if(!r.ok){const e=await r.json();throw new Error(e.detail||'请求失败')}const d=await r.json();hi();rd(d)}catch(e){sh('转换失败: '+e.message,'er')}finally{b.disabled=false;b.textContent='🎬 开始转换'}}document.getElementById('nt').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')go()});function sh(m,t){const c=t==='er'?'er':t==='ld'?'ld':'sc';document.getElementById('sa').innerHTML=`<div class="st ${c}">${t==='ld'?'<span class="sp"></span>':''}${m}</div>`}function hi(){document.getElementById('sa').innerHTML=''}function rd(d){const a=document.getElementById('ra');let h='<div class="cd"><h2>✅ 转换完成</h2>';h+='<div class="ss">';h+=`<div class="sx"><div class="n">${d.chapter_count}</div><div class="l">章节</div></div>`;h+=`<div class="sx"><div class="n">${d.character_count}</div><div class="l">角色</div></div>`;h+=`<div class="sx"><div class="n">${d.scene_count}</div><div class="l">场次</div></div>`;h+=`<div class="sx"><div class="n">${(d.analysis_time_ms/1000).toFixed(1)}s</div><div class="l">耗时</div></div>`;h+='</div>';if(d.summary)h+=`<p style="padding:10px;background:#faf7f3;border-radius:6px;font-style:italic;margin-bottom:8px">📝 ${e(d.summary)}</p>`;h+='<div class="tb"><div class="ta ac" onclick="sw(\'y\',this)">YAML</div><div class="ta" onclick="sw(\'j\',this)">JSON</div></div>';h+=`<div id="ty" class="tc ac"><pre>${e(d.yaml)}</pre></div>`;h+=`<div id="tj" class="tc"><pre>${JSON.stringify(d.script_json,null,2)}</pre></div>`;a.innerHTML=h}function sw(n,el){document.querySelectorAll('.ta').forEach(t=>t.classList.remove('ac'));document.querySelectorAll('.tc').forEach(c=>c.classList.remove('ac'));el.classList.add('ac');document.getElementById('t'+n).classList.add('ac')}function e(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}</script></body></html>
