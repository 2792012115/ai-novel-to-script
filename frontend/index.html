<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 小说转剧本工具</title>
<style>
:root {
    --bg: #faf9f7; --card: #fff; --text: #2c2416; --text2: #6b5e4a;
    --border: #d4c8b5; --primary: #8b5e3c; --ph: #6b4226;
    --success: #4a7c59; --danger: #c0392b; --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Noto Serif SC', 'SimSun', Georgia, serif; background:var(--bg);
       color:var(--text); line-height:1.8; min-height:100vh; }
.header { background:var(--card); border-bottom:2px solid var(--border);
          padding:18px 24px; text-align:center; }
.header h1 { font-size:24px; color:var(--ph); }
.header .sub { font-size:13px; color:var(--text2); margin-top:4px; }
.container { max-width:1100px; margin:24px auto; padding:0 20px; }
.card { background:var(--card); border:1px solid var(--border);
        border-radius:var(--radius); padding:24px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
.card h2 { font-size:17px; color:var(--ph); margin-bottom:14px;
           padding-bottom:8px; border-bottom:1px solid var(--border); }
textarea { width:100%; min-height:280px; padding:14px; font-size:14px;
           border:1px solid var(--border); border-radius:6px; resize:vertical;
           font-family: inherit; line-height:1.8; outline:none; }
textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(139,94,60,0.12); }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
.row .field { flex:1; min-width:200px; }
.field label { display:block; font-size:13px; color:var(--text2); margin-bottom:4px; }
.field input { width:100%; padding:10px 12px; font-size:14px; border:1px solid var(--border);
               border-radius:6px; outline:none; font-family:inherit; }
.field input:focus { border-color:var(--primary); }
.btn { padding:12px 32px; font-size:15px; font-weight:600; border:none;
       border-radius:6px; cursor:pointer; transition:.2s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--ph); }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
.btn-sm { padding:6px 16px; font-size:12px; border-radius:4px; }
.btn-outline { background:transparent; border:1px solid var(--primary); color:var(--primary); }
.btn-outline:hover { background:#f5efe8; }
.status { padding:12px 16px; border-radius:6px; margin-bottom:16px; font-size:14px; }
.status.loading { background:#fff8e1; border:1px solid #ffd54f; color:#6d4c00; }
.status.error { background:#ffebee; border:1px solid #ef9a9a; color:#b71c1c; }
.status.success { background:#e8f5e9; border:1px solid #a5d6a7; color:#1b5e20; }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid #ccc;
           border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite;
           vertical-align:middle; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }
.stats { display:flex; gap:20px; flex-wrap:wrap; margin:16px 0; }
.stat { text-align:center; padding:12px 20px; background:#faf7f3; border-radius:8px; }
.stat .num { font-size:28px; font-weight:700; color:var(--primary); }
.stat .label { font-size:12px; color:var(--text2); }
pre { background:#faf7f3; padding:16px; border-radius:6px; overflow-x:auto;
      font-size:13px; line-height:1.6; max-height:600px; overflow-y:auto;
      border:1px solid var(--border); }
.tabs { display:flex; gap:0; margin-bottom:16px; }
.tab { padding:8px 20px; border:1px solid var(--border); cursor:pointer;
        font-size:13px; background:#faf7f3; }
.tab:first-child { border-radius:6px 0 0 6px; }
.tab:last-child { border-radius:0 6px 6px 0; }
.tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.tab-content { display:none; }
.tab-content.active { display:block; }
.footer { text-align:center; padding:24px; color:var(--text2); font-size:13px; }
.schema-card { background:#faf7f3; border:1px dashed var(--border); padding:16px;
               border-radius:6px; font-size:13px; color:var(--text2); margin-top:12px; }
.schema-card a { color:var(--primary); }
@media (max-width:640px) {
    .row { flex-direction:column; }
    .container { padding:0 10px; }
}
</style>
</head>
<body>
<header class="header">
    <h1>📜 AI 小说转剧本工具</h1>
    <div class="sub">将 3 章以上小说文本自动转换为结构化 YAML 剧本</div>
</header>

<div class="container">
    <div class="card">
        <h2>📖 输入小说文本</h2>
        <textarea id="novelText" placeholder="请粘贴 3 章以上的小说文本...
支持自动识别章节标题（如：第一章 xxx / Chapter 1 xxx）"></textarea>
        <div class="row" style="margin-top:14px;">
            <div class="field">
                <label>小说标题（选填）</label>
                <input id="novelTitle" placeholder="自动从文本提取">
            </div>
            <div class="field">
                <label>作者（选填）</label>
                <input id="author" placeholder="自动从文本提取">
            </div>
            <div class="field">
                <label>改编风格（选填）</label>
                <input id="styleNote" placeholder="如：悬疑 / 喜剧 / 正剧">
            </div>
        </div>
        <div style="margin-top:14px;display:flex;align-items:center;gap:12px;">
            <button class="btn btn-primary" id="convertBtn" onclick="startConvert()">
                🎬 开始转换
            </button>
            <span style="font-size:12px;color:var(--text2);">
                ⚡ 四阶段AI流水线：角色提取 → 场景切分 → 对白生成 → YAML输出
            </span>
        </div>
    </div>

    <div id="statusArea"></div>
    <div id="resultArea"></div>
</div>

<div class="footer">
    AI 小说转剧本工具 · Powered by DeepSeek · 剧本 YAML Schema 见 <a href="/docs/yaml_schema.md" style="color:var(--primary);">设计文档</a>
</div>

<script>
const API = '/api';
async function startConvert() {
    const text = document.getElementById('novelText').value.trim();
    if (!text) { showStatus('请输入小说文本', 'error'); return; }

    const btn = document.getElementById('convertBtn');
    btn.disabled = true; btn.textContent = '⏳ 转换中...';
    showStatus('AI四阶段流水线运行中：角色提取 → 场景切分 → 对白生成 → YAML输出，请稍候...', 'loading');
    document.getElementById('resultArea').innerHTML = '';

    try {
        const resp = await fetch(`${API}/convert`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                novel_text: text,
                novel_title: document.getElementById('novelTitle').value,
                author: document.getElementById('author').value,
                style_note: document.getElementById('styleNote').value,
            }),
        });
        if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || '请求失败'); }
        const data = await resp.json();
        hideStatus();
        renderResult(data);
    } catch(e) {
        showStatus('转换失败: ' + e.message, 'error');
    } finally {
        btn.disabled = false; btn.textContent = '🎬 开始转换';
    }
}

document.getElementById('novelText').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') startConvert();
});

function showStatus(msg, type) {
    const cls = type === 'error' ? 'error' : type === 'loading' ? 'loading' : 'success';
    document.getElementById('statusArea').innerHTML =
        `<div class="status ${cls}">${type==='loading'?'<span class="spinner"></span>':''}${msg}</div>`;
}
function hideStatus() { document.getElementById('statusArea').innerHTML = ''; }

function renderResult(data) {
    const area = document.getElementById('resultArea');
    let html = '<div class="card"><h2>✅ 转换完成</h2>';

    html += '<div class="stats">';
    html += `<div class="stat"><div class="num">${data.chapter_count}</div><div class="label">章节数</div></div>`;
    html += `<div class="stat"><div class="num">${data.character_count}</div><div class="label">角色数</div></div>`;
    html += `<div class="stat"><div class="num">${data.scene_count}</div><div class="label">场次数</div></div>`;
    html += `<div class="stat"><div class="num">${(data.analysis_time_ms/1000).toFixed(1)}s</div><div class="label">耗时</div></div>`;
    html += '</div>';

    if (data.summary) {
        html += `<p style="margin-bottom:12px;padding:12px;background:#faf7f3;border-radius:6px;font-style:italic;">
                  📝 ${escapeHtml(data.summary)}</p>`;
    }

    html += '<div class="tabs">';
    html += '<div class="tab active" onclick="switchTab(\'yaml\',this)">YAML 剧本</div>';
    html += '<div class="tab" onclick="switchTab(\'json\',this)">JSON 结构化</div>';
    html += '</div>';

    html += `<div id="tab-yaml" class="tab-content active"><pre>${escapeHtml(data.yaml)}</pre></div>`;
    html += `<div id="tab-json" class="tab-content"><pre>${JSON.stringify(data.script_json, null, 2)}</pre></div>`;

    html += '<div style="margin-top:12px;display:flex;gap:8px;">';
    html += `<button class="btn btn-sm btn-outline" onclick="downloadFile('${escapeHtml(data.yaml)}','script.yaml','text/yaml')">⬇ 下载 YAML</button>`;
    html += `<button class="btn btn-sm btn-outline" onclick="downloadFile('${JSON.stringify(data.script_json,null,2).replace(/'/g,\"\\\\'\")}','script.json','application/json')">⬇ 下载 JSON</button>`;
    html += '</div>';

    html += '<div class="schema-card">📐 剧本 YAML Schema 设计文档：<a href="/docs/yaml_schema.md" target="_blank">查看完整 Schema 定义与设计原因</a></div>';
    html += '</div>';
    area.innerHTML = html;
}

function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
}

function downloadFile(content, filename, mime) {
    const blob = new Blob([content], {type: mime + ';charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}

function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>
</body>
</html>
